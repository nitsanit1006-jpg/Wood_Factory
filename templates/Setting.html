<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f1ea;
        font-family: "Poppins", sans-serif;
        margin: 0;
      }

      .settings-container {
        display: flex;
        gap: 20px;
        max-width: 1200px;
        margin: 20px auto;
      }

      .settings-sidebar {
        width: 220px;
        background: #2c241b;
        color: white;
        border-radius: 15px;
        padding: 20px;
        min-height: 550px;
      }

      .settings-sidebar h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 18px;
      }

      .settings-sidebar ul {
        list-style: none;
        padding: 0;
      }

      .settings-sidebar li {
        padding: 12px 15px;
        margin-bottom: 10px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
      }

      .settings-sidebar li:hover,
      .settings-sidebar li.active {
        background: #9a6a40;
      }

      .settings-content {
        flex: 1;
      }

      .card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      }

      .card h3 {
        color: #9a6a40;
        margin-bottom: 20px;
        font-size: 20px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
        font-size: 14px;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        font-size: 14px;
      }

      .form-group textarea {
        height: 80px;
        resize: none;
      }

      .btn {
        background: #9a6a40;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
      }

      .btn:hover {
        background: #7d5433;
      }

      .danger {
        background: #dc3545;
      }

      .danger:hover {
        background: #b52b3a;
      }

      .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid #eee;
        margin-bottom: 15px;
      }

      .setting-row span {
        font-size: 15px;
        font-weight: 600;
        color: #2c241b;
      }

      .toggle-btn {
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        color: white;
        cursor: pointer;
        min-width: 75px;
        transition: 0.3s;
      }

      .toggle-btn.on {
        background: #198754;
      }

      .toggle-btn.off {
        background: #dc3545;
      }

      .toggle-btn:hover {
        opacity: 0.9;
        transform: scale(1.05);
      }

      .form-group {
        margin-top: 18px;
        margin-bottom: 18px;
      }

      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #2c241b;
        font-size: 14px;
      }

      .form-group select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        background: white;
      }

      .btn {
        background: #9a6a40;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        margin-top: 10px;
      }

      .btn:hover {
        background: #7d5433;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }
      .action-buttons {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 15px;
      }

      .back-dashboard-btn {
        background: #7d5433;
        color: white;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        transition: 0.3s;
      }

      .back-dashboard-btn:hover {
        background: #7d5433;
      }
    </style>
  </head>
  <body class="{% if settings.dark_mode %}dark-mode{% endif %}">
    <div class="settings-container">
      <!-- Sidebar -->
      <div class="settings-sidebar">
        <h2>⚙ Settings</h2>

        <ul>
          <li class="menu-item active" onclick="showSection('company')">
            🏢 Company Info
          </li>

          <li class="menu-item" onclick="showSection('security')">
            🔒 Security
          </li>
        </ul>
      </div>

      <!-- Content -->
      <div class="settings-content">
        <!-- COMPANY INFO -->
        <div id="company" class="card settings-section">
          <h3>🏢 Company Information</h3>

          <form
            action="{{ url_for('save_company_info') }}"
            method="POST"
            enctype="multipart/form-data"
          >
            <div class="form-group">
              <label>Company Name</label>
              <input
                type="text"
                name="company_name"
                value="{{ settings.company_name if settings else '' }}"
              />
            </div>

            <div class="form-group">
              <label>GST Number</label>
              <input
                type="text"
                name="gst_number"
                value="{{ settings.gst_number if settings else '' }}"
              />
            </div>

            <div class="form-group">
              <label>Address</label>
              <textarea name="address">
{{ settings.address if settings else '' }}</textarea
              >
            </div>

            <div class="form-group">
              <label>Company Logo</label>
              <input type="file" name="logo" />
            </div>

            <button type="submit" class="btn">Save Company Info</button>
            <a href="{{ url_for('dashboard') }}" class="back-dashboard-btn">
              ← Back to Dashboard
            </a>
          </form>
        </div>

        <!-- SECURITY -->
        <div id="security" class="card settings-section" style="display: none">
          <h3>🔒 Security</h3>

          <form action="/update-password" method="POST">
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" name="current_password" />
            </div>

            <div class="form-group">
              <label>New Password</label>
              <input type="password" name="new_password" />
            </div>

            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" name="confirm_password" />
            </div>

            <button type="submit" class="btn">Update Password</button>
            <a href="{{ url_for('dashboard') }}" class="back-dashboard-btn">
              ← Back to Dashboard
            </a>
          </form>
        </div>
      </div>
    </div>

    <script>
      function showSection(sectionId) {
        document.querySelectorAll(".settings-section").forEach((section) => {
          section.style.display = "none";
        });

        document.getElementById(sectionId).style.display = "block";

        document.querySelectorAll(".menu-item").forEach((item) => {
          item.classList.remove("active");
        });

        event.target.classList.add("active");
      }
    </script>
    <script>
      document
        .getElementById("darkMode")
        .addEventListener("change", function () {
          fetch("/update-dark-mode", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              dark_mode: this.checked,
            }),
          });
        });
    </script>

    {% with messages = get_flashed_messages() %} {% if messages %}

    <div id="toast">{{ messages[0] }}</div>

    <script>
      setTimeout(() => {
        document.getElementById("toast").style.display = "none";
      }, 3000);
    </script>

    {% endif %} {% endwith %}
  </body>
</html>
